{% extends 'base.html' %}
{% block titulo %}Novo Usuário — VitaSaúde{% endblock %}

{% block conteudo %}
<div class="page-header">
    <h2>👤 Novo Usuário</h2>
</div>

<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card">
            <div class="card-header" style="background:var(--azul-escuro);color:#fff;">
                Dados do usuário
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('inserir_usuario') }}" method="POST">

                    <div class="mb-3">
                        <label for="nome" class="form-label">
                            Nome completo <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="nome" name="nome"
                               value="{{ nome | default('') }}"
                               required minlength="2"
                               placeholder="Ex: Dr. João da Silva">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">
                            E-mail profissional <span class="text-danger">*</span>
                        </label>
                        <input type="email" class="form-control" id="email" name="email"
                               value="{{ email | default('') }}"
                               required placeholder="joao@vitasaude.com">
                    </div>

                    <div class="mb-4">
                        <label for="perfil" class="form-label">
                            Perfil <span class="text-danger">*</span>
                        </label>
                        <select class="form-select" id="perfil" name="perfil" required>
                            <option value="">Selecione um perfil...</option>
                            <option value="Médico"
                                {% if perfil|default('') == 'Médico' %}selected{% endif %}>
                                🩺 Médico
                            </option>
                            <option value="Recepcionista"
                                {% if perfil|default('') == 'Recepcionista' %}selected{% endif %}>
                                📋 Recepcionista
                            </option>
                            <option value="Administrador"
                                {% if perfil|default('') == 'Administrador' %}selected{% endif %}>
                                ⚙️ Administrador
                            </option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            ✅ Salvar
                        </button>
                        <a href="{{ url_for('listar_usuarios') }}"
                           class="btn btn-outline-secondary">
                            ❌ Cancelar
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
