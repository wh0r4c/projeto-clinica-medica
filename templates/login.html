{% extends 'base_publica.html' %}
{% block titulo %}Entrar — VitaSaúde{% endblock %}

{% block conteudo %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <div style="font-size:2.5rem;">🏥</div>
                        <h2 class="mt-2 mb-0" style="font-size:1.5rem;color:var(--azul-escuro);">
                            Acesso ao Sistema
                        </h2>
                        <p class="text-muted mt-1" style="font-size:.88rem;">
                            Área restrita a profissionais da clínica
                        </p>
                    </div>

                    <form action="{{ url_for('login') }}" method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail profissional</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   value="{{ email | default('') }}"
                                   required placeholder="seu@vitasaude.com">
                        </div>
                        <div class="mb-4">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="senha" name="senha"
                                   required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            Entrar no sistema
                        </button>
                    </form>

                    <hr class="my-4">
                    <p class="text-center text-muted mb-0" style="font-size:.88rem;">
                        Não tem cadastro?
                        <a href="{{ url_for('cadastro') }}"
                           style="color:var(--azul-claro);font-weight:600;">
                            Solicitar acesso
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
